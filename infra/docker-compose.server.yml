name: ark-server

services:
  postgres:
    image: postgres:16.13-alpine3.23
    container_name: ark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7.4.8-alpine3.21
    container_name: ark-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ../.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ark-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-39000}:9000"
    volumes:
      - ../.data/minio:/data

  executor-fastapi:
    build:
      context: ../services/executor-fastapi
      dockerfile: Dockerfile
    container_name: ark-executor-fastapi
    restart: unless-stopped
    env_file:
      - ../deploy/server.env
    environment:
      EXECUTOR_PORT: 8080
      EXECUTOR_ARTIFACT_BASE_URL: http://minio:9000/${S3_BUCKET}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_SIGNED_URL_TTL_SEC: ${S3_SIGNED_URL_TTL_SEC}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  vidbee-api:
    build:
      context: ../services/vidbee-workspace
      dockerfile: apps/api/Dockerfile
    container_name: ark-vidbee-api
    restart: unless-stopped
    env_file:
      - ../deploy/server.env
    environment:
      VIDBEE_API_HOST: 0.0.0.0
      VIDBEE_API_PORT: 3100
      VIDBEE_DOWNLOAD_DIR: /data/downloads
      VIDBEE_HISTORY_STORE_PATH: /data/vidbee/vidbee.db
      VIDBEE_PROXY: ${OMNIAGENT_VIDBEE_PROXY:-}
      VIDBEE_CONFIG_PATH: ${VIDBEE_CONFIG_PATH:-}
      VIDBEE_COOKIES_PATH: ${VIDBEE_COOKIES_PATH:-}
      VIDBEE_BROWSER_FOR_COOKIES: ${VIDBEE_BROWSER_FOR_COOKIES:-}
      VIDBEE_EMBED_SUBS: ${VIDBEE_EMBED_SUBS:-}
      VIDBEE_EMBED_THUMBNAIL: ${VIDBEE_EMBED_THUMBNAIL:-}
      VIDBEE_EMBED_METADATA: ${VIDBEE_EMBED_METADATA:-}
      VIDBEE_EMBED_CHAPTERS: ${VIDBEE_EMBED_CHAPTERS:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ../.data/vidbee-downloads:/data/downloads
      - ../.data/vidbee-downloads:/vidbee-downloads
      - ../.data/vidbee:/data/vidbee
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3100/health > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ark-web:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: ark-web
    restart: unless-stopped
    env_file:
      - ../deploy/server.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      executor-fastapi:
        condition: service_started
      vidbee-api:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      OMNIAGENT_RUN_STORE: postgres
      OMNIAGENT_JOB_STORE: redis
      OMNIAGENT_USAGE_STORE: postgres
      OMNIAGENT_EXECUTOR_BASE_URL: http://executor-fastapi:8080
      OMNIAGENT_ARTIFACT_STORE: s3
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_INTERNAL_ENDPOINT: ${S3_INTERNAL_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_SIGNED_URL_TTL_SEC: ${S3_SIGNED_URL_TTL_SEC}
      OMNIAGENT_LOCAL_STATE_DIR: /app/.omniagent-state
      OMNIAGENT_WORKSPACE_ROOT: /app/.workspace
      OMNIAGENT_SERVICE_ROOT: /app/.omni-services
      OMNIAGENT_SERVICE_LOG_DIR: /app/service-logs
    ports:
      - "${ARK_HTTP_PORT:-80}:3000"
    volumes:
      - ../.data/ark-state:/app/.omniagent-state
      - ../.data/ark-workspace:/app/.workspace
      - ../.data/ark-services:/app/.omni-services
      - ../.data/ark-logs:/app/service-logs
      - ../.data/vidbee-downloads:/vidbee-downloads:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
